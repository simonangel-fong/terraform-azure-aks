apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 00-app-of-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/terraform-azure-aks
    targetRevision: master
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
